services:
  postgres:
    image: postgres:16
    container_name: pokemon-watcher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pokemon_watcher
      POSTGRES_PASSWORD: pokemon_watcher
      POSTGRES_DB: pokemon_watcher
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon_watcher"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pokemon-watcher-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
