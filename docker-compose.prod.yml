services:
  postgres:
    image: postgres:16
    container_name: pokemon-watcher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pokemon-watcher-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Self-hosted ntfy server. Avoids the rate limits of the public ntfy.sh
  # (~60 messages/hour/visitor IP). App reaches it internally via
  # http://ntfy:80; the phone subscribes to https://ntfy.adogan.de which is
  # fronted by host-Caddy (see /etc/caddy/Caddyfile).
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: pokemon-watcher-ntfy
    restart: unless-stopped
    command: ["serve"]
    environment:
      TZ: Europe/Berlin
      NTFY_BASE_URL: https://ntfy.adogan.de
      NTFY_LISTEN_HTTP: ":80"
      NTFY_BEHIND_PROXY: "true"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_CACHE_DURATION: 12h
      NTFY_ATTACHMENT_CACHE_DIR: /var/cache/ntfy/attachments
      NTFY_ENABLE_LOGIN: "false"
      NTFY_ENABLE_SIGNUP: "false"
    volumes:
      - ntfydata:/var/cache/ntfy
    ports:
      - "127.0.0.1:8889:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build: .
    image: pokemon-watcher:latest
    container_name: pokemon-watcher-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ntfy:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /app/data/events.log
      WEB_PORT: ${WEB_PORT:-3000}
      WEB_USERNAME: ${WEB_USERNAME:-admin}
      WEB_PASSWORD: ${WEB_PASSWORD:?set WEB_PASSWORD in .env}
    ports:
      # Bind only to localhost by default — front this with a reverse proxy
      # (Caddy/nginx) for TLS. Set BIND_HOST=0.0.0.0 in .env to expose publicly.
      - "${BIND_HOST:-127.0.0.1}:${HOST_PORT:-3000}:${WEB_PORT:-3000}"
    volumes:
      - appdata:/app/data

volumes:
  pgdata:
  redisdata:
  appdata:
  ntfydata:
